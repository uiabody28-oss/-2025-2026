<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الطالب</title>

<style>
    .logo{
    width:120px;
    margin-bottom:15px;
    }
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#fff;
    width:90%;
    max-width:450px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    text-align:center;
}

input{
    width:90%;
    padding:12px;
    font-size:18px;
    margin:15px 0;
}

button{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

#page2{
    display:none;
}

img{
    width:140%;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="box" id="page1">
    <img src="شعار_وزارة_التربية_العراقية.svg" alt="" class="logo">
<h2>ادخل الرمز السري الخاص بالطالب</h2>

<input id="pass" type="password">

<br>

<button onclick="login()">دخول</button>

<p id="msg" style="color:red;"></p>
</div>

<div class="box" id="page2">
<h2>مرحبًا بالطالب</h2>

<img src="Picsart_26-07-18_15-17-25-129.jpg" alt="الصورة">
</div>

<script>
function login(){
    var password=document.getElementById("pass").value;

    if(password=="281424168"){
        document.getElementById("page1").style.display="none";
        document.getElementById("page2").style.display="block";
    }else{
        document.getElementById("msg").innerHTML="الرمز السري غير صحيح";
    }
}
</script>

</body>
  </html>
